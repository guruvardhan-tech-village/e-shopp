<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Calendar</title>
    <link rel="stylesheet" href="calender.css">
</head>
<body>
    <div class="calendar-container">
        <div class="calendar-header">
            <button id="prev-btn" class="nav-btn">&lt;</button>
            <p class="month-name" id="month-name">April 2026</p>
            <button id="next-btn" class="nav-btn">&gt;</button>
        </div>
        <div class="calendar-weekdays">
            <span>Sun</span>
            <span>Mon</span>
            <span>Tue</span>
            <span>Wed</span>
            <span>Thu</span>
            <span>Fri</span>
            <span>Sat</span>
        </div>
        <div id="days-container" class="calendar-grid"></div>
        <div class="selected-date">
            <p class="day-name" id="day-name">Friday</p>
            <p class="day-number" id="day-number">20</p>
            <p class="year" id="year">2026</p>
        </div>
    </div>
    <script src="calender.js"></script>
</body>
</html>
